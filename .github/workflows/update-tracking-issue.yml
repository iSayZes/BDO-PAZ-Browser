name: Update tracking issue

on:
  issues:
    types: [opened, labeled, unlabeled, closed, reopened]

jobs:
  update:
    if: "contains(github.event.issue.labels.*.name, 'type: file-format 🗂️')"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: Update tracking issue
        env:
          GH_TOKEN: ${{ secrets.PAZ_TOKEN }}
          GH_REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ toJson(github.event.issue.body) }}
          EVENT_ACTION: ${{ github.event.action }}
          ISSUE_LABELS: ${{ toJson(github.event.issue.labels.*.name) }}
        run: |
          python3 << 'EOF'
          import os, re, json, subprocess, sys

          issue_number = os.environ['ISSUE_NUMBER']
          issue_title  = os.environ['ISSUE_TITLE']
          issue_body   = json.loads(os.environ['ISSUE_BODY'])
          event_action = os.environ['EVENT_ACTION']
          issue_labels = json.loads(os.environ['ISSUE_LABELS'])

          ext = issue_title.strip().lower()
          if not re.match(r'^\.?[a-z0-9_-]+(\.[a-z0-9]+)+$', ext):
              print(f'Invalid title format: "{ext}" — applying label and skipping.')
              subprocess.run(
                  ['gh', 'issue', 'edit', issue_number,
                   '--add-label', 'status: invalid title ⁉️'],
                  check=True
              )
              sys.exit(0)

          # Parse goal from issue body
          goal_map = {
              'Document format':               'Document 📄',
              'Add parsed preview handler':    'New Handler ✨',
              'Fix existing handler':           'Fix Handler 🔧',
              'Improve decoded fields':        'Improve 🔬',
              'Investigate unknown bytes':     'Investigate 🔍',
              'Other / unsure':                'Other ❓',
          }
          goal = '❓ Other'
          goal_match = re.search(r'### Goal\s+(.+)', issue_body or '')
          if goal_match:
              goal = goal_map.get(goal_match.group(1).strip(), '❓ Other')

          # Highest-priority status label wins
          status_priority = [
              ('status: blocked 🔒',           'blocked 🔒'),
              ('status: ready-for-handler 🟢', 'ready-for-handler 🟢'),
              ('status: in-progress 🚧',        'in-progress 🚧'),
              ('status: needs-research 🔍',     'needs-research 🔍'),
              ('status: New 👀',                'New 👀'),
          ]
          status = 'New 👀'
          for label, display in status_priority:
              if label in issue_labels:
                  status = display
                  break

          def make_child(number, g, s, closed=False):
              box = 'x' if closed else ' '
              s = 'done' if closed else s
              return f'  - [{box}] #{number} - {g} - {s}'

          result = subprocess.run(
              ['gh', 'issue', 'view', '1', '--json', 'body'],
              capture_output=True, text=True, check=True
          )
          body = json.loads(result.stdout).get('body') or ''
          lines = body.split('\n')

          parent_pat = re.compile(r'^- ' + re.escape(ext) + r'\s*$', re.IGNORECASE)
          child_pat  = re.compile(r'^  - \[[ x]\] #' + re.escape(issue_number) + r'\b')

          parent_idx = None
          child_idx  = None
          for i, line in enumerate(lines):
              if parent_pat.match(line):
                  parent_idx = i
              if child_pat.match(line):
                  child_idx = i

          if event_action == 'opened':
              new_child = make_child(issue_number, goal, status)
              if parent_idx is not None:
                  # insert after last indented child of this parent
                  insert_at = parent_idx + 1
                  j = parent_idx + 1
                  while j < len(lines) and lines[j].startswith('  '):
                      insert_at = j + 1
                      j += 1
                  lines.insert(insert_at, new_child)
              else:
                  lines.append(f'- {ext}')
                  lines.append(new_child)

          elif child_idx is not None:
              lines[child_idx] = make_child(issue_number, goal, status, closed=(event_action == 'closed'))

          else:
              print(f'No child line for #{issue_number} ({ext}) — skipping.')
              sys.exit(0)

          subprocess.run(
              ['gh', 'issue', 'edit', '1', '--body', '\n'.join(lines)],
              check=True
          )
          print(f'Updated tracking issue #1 for {ext} ({event_action}).')
          EOF
